name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests -v
      - run: r2d validate examples/fictional-ai-governance-research-to-decision/decision_brief.json
      - run: r2d score examples/fictional-ai-governance-research-to-decision/decision_brief.json --json > /tmp/score.json
      - run: r2d report examples/fictional-ai-governance-research-to-decision/decision_brief.json --output /tmp/report.md
